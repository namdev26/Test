server:
  port: 5000

spring:
  application:
    name: payment-service

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  datasource:
    url: jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  h2:
    console:
      enabled: true
      path: /h2-console

booking:
  service:
    url: ${BOOKING_SERVICE_URL:http://ticket-booking-service:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.payment: DEBUG
