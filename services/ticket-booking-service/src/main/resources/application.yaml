server:
  port: 5000

spring:
  application:
    name: ticket-booking-service

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  datasource:
    url: jdbc:h2:mem:bookingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

customer:
  service:
    url: ${CUSTOMER_SERVICE_URL:http://customer-service:5000}

seat:
  service:
    url: ${SEAT_SERVICE_URL:http://seat-availability-service:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.booking: DEBUG
