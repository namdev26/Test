# Docker Compose — Multi-container orchestration (Java Spring Boot microservices)
# Run: docker compose up --build

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - gateway
    networks:
      - app-network

  # ─── API Gateway ──────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8081}:8000"
    depends_on:
      - customer-service
      - movie-service
      - seat-availability-service
      - ticket-booking-service
      - payment-service
      - notification-service
    networks:
      - app-network

  # ─── Business Services ────────────────────────────────────────────────────
  customer-service:
    build: ./services/customer-service
    ports:
      - "${CUSTOMER_SERVICE_PORT:-5001}:5000"
    networks:
      - app-network

  movie-service:
    build: ./services/movie-service
    ports:
      - "${MOVIE_SERVICE_PORT:-5002}:5000"
    networks:
      - app-network

  seat-availability-service:
    build: ./services/seat-availability-service
    ports:
      - "${SEAT_SERVICE_PORT:-5003}:5000"
    networks:
      - app-network

  ticket-booking-service:
    build: ./services/ticket-booking-service
    ports:
      - "${BOOKING_SERVICE_PORT:-5004}:5000"
    environment:
      - CUSTOMER_SERVICE_URL=http://customer-service:5000
      - SEAT_SERVICE_URL=http://seat-availability-service:5000
    depends_on:
      - customer-service
      - seat-availability-service
    networks:
      - app-network

  payment-service:
    build: ./services/payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT:-5005}:5000"
    environment:
      - BOOKING_SERVICE_URL=http://ticket-booking-service:5000
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      ticket-booking-service:
        condition: service_started
    networks:
      - app-network

  notification-service:
    build: ./services/notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-5006}:5000"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
