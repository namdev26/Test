events {}

http {
  upstream customer_service_upstream { server customer-service:5000; }
  upstream movie_service_upstream { server movie-service:5000; }
  upstream seat_service_upstream { server seat-availability-service:5000; }
  upstream booking_service_upstream { server ticket-booking-service:5000; }
  upstream payment_service_upstream { server payment-service:5000; }
  upstream notification_service_upstream { server notification-service:5000; }

  server {
    listen 8000;
    server_name _;

    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    location /api/customers/ { proxy_pass http://customer_service_upstream/customers/; }
    location = /api/customers { proxy_pass http://customer_service_upstream/customers; }

    location /api/movies/ { proxy_pass http://movie_service_upstream/movies/; }
    location = /api/movies { proxy_pass http://movie_service_upstream/movies; }

    location /api/showtimes/ { proxy_pass http://seat_service_upstream/showtimes/; }

    location /api/bookings/ { proxy_pass http://booking_service_upstream/bookings/; }
    location = /api/bookings { proxy_pass http://booking_service_upstream/bookings; }

    location /api/payments/ { proxy_pass http://payment_service_upstream/payments/; }
    location = /api/payments { proxy_pass http://payment_service_upstream/payments; }

    location /api/notifications/ { proxy_pass http://notification_service_upstream/notifications/; }
    location = /api/notifications/email { proxy_pass http://notification_service_upstream/notifications/email; }
  }
}
