events {}

http {
  upstream customer_svc  { server customer-service:5000; }
  upstream movie_svc     { server movie-service:5000; }
  upstream seat_svc      { server seat-availability-service:5000; }
  upstream booking_svc   { server ticket-booking-service:5000; }
  upstream payment_svc   { server payment-service:5000; }
  upstream notif_svc     { server notification-service:5000; }

  server {
    listen 8000;
    server_name _;

    # ── CORS preflight (handled once via map approach) ────────────────────
    # ── Health ───────────────────────────────────────────────────────────
    location = /health {
      add_header Content-Type application/json always;
      add_header Access-Control-Allow-Origin * always;
      return 200 '{"status":"ok"}';
    }

    # ── /api/customers/** → customer-service ─────────────────────────────
    location /api/customers {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Idempotency-Key";
        return 204;
      }
      add_header Access-Control-Allow-Origin * always;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://customer_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── /api/movies/** → movie-service ───────────────────────────────────
    location /api/movies {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
        return 204;
      }
      add_header Access-Control-Allow-Origin * always;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://movie_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── /api/showtimes/** → seat-availability-service ────────────────────
    location /api/showtimes {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
        return 204;
      }
      add_header Access-Control-Allow-Origin * always;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://seat_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── /api/bookings/** → ticket-booking-service ────────────────────────
    location /api/bookings {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Idempotency-Key";
        return 204;
      }
      add_header Access-Control-Allow-Origin * always;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://booking_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── /api/payments/** → payment-service ───────────────────────────────
    location /api/payments {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Idempotency-Key";
        return 204;
      }
      add_header Access-Control-Allow-Origin * always;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://payment_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── /api/notifications/** → notification-service ─────────────────────
    location /api/notifications {
      add_header Access-Control-Allow-Origin * always;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://notif_svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
